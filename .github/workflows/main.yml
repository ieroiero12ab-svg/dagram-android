name: Build Dagram APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dagram-android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Download gradle-wrapper.jar
        run: mkdir -p gradle/wrapper && curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - name: Create gradle.properties
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties

      - name: Create app icons
        run: |
          sudo apt-get install -y imagemagick
          declare -A sizes=( [mipmap-mdpi]=48 [mipmap-hdpi]=72 [mipmap-xhdpi]=96 [mipmap-xxhdpi]=144 [mipmap-xxxhdpi]=192 )
          for folder in "${!sizes[@]}"; do
            size=${sizes[$folder]}
            dir="app/src/main/res/$folder"
            mkdir -p "$dir"
            convert -size ${size}x${size} xc:"#1a73e8" -fill white -gravity center -pointsize $((size/3)) -annotate 0 "D" "$dir/ic_launcher.png"
            convert -size ${size}x${size} xc:"#1a73e8" -fill white -gravity center -pointsize $((size/3)) -annotate 0 "D" "$dir/ic_launcher_round.png"
          done

      - name: Fix missing sp import
        run: |
          FILE="app/src/main/java/com/dagram/app/ui/channels/CreateChannelScreen.kt"
          if [ -f "$FILE" ]; then
            if ! grep -q "import androidx.compose.ui.unit.sp" "$FILE"; then
              sed -i 's/import androidx.compose.ui.unit.dp/import androidx.compose.ui.unit.dp\nimport androidx.compose.ui.unit.sp/' "$FILE"
              echo "Fixed: added sp import"
            fi
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dagram-Debug-APK
          path: dagram-android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
